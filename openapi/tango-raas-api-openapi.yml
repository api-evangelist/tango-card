  # ── Orders ───────────────────────────────────────────────────────────────────

  /orders:
    get:
      operationId: listOrders
      summary: List orders
      description: Retrieve a list of reward orders.
      tags: [Orders]
      parameters:
        - name: accountIdentifier
          in: query
          schema:
            type: string
          description: Filter by account identifier
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter orders created after this date
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter orders created before this date
        - name: elementsPerBlock
          in: query
          schema:
            type: integer
          description: Number of results per page
        - name: page
          in: query
          schema:
            type: integer
          description: Page number for pagination
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  totalCount:
                    type: integer
        '401': {$ref: '#/components/responses/Unauthorized'}
    post:
      operationId: createOrder
      summary: Create an order
      description: Place a new reward order to send a gift card or incentive.
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '429': {$ref: '#/components/responses/TooManyRequests'}

  /orders/{referenceOrderID}:
    get:
      operationId: getOrder
      summary: Get an order
      description: Retrieve a specific order by reference order ID.
      tags: [Orders]
      parameters:
        - name: referenceOrderID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  /orders/{referenceOrderID}/resends:
    post:
      operationId: resendOrder
      summary: Resend an order
      description: Resend the reward delivery for a specific order.
      tags: [Orders]
      parameters:
        - name: referenceOrderID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Override email address for resend
      responses:
        '200':
          description: Order resent
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

